{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">🌱</div>
        <div class="auth-title">Criar Conta</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" name="nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha <small style="color:#888">(mín. 6 caracteres)</small></label>
                <input type="password" name="senha" placeholder="••••••" required>
            </div>
            <div class="form-group">
                <label>Confirmar senha</label>
                <input type="password" name="confirmar" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Cadastrar</button>
        </form>
        <div class="auth-link">
            Já tem conta? <a href="{{ url_for('login') }}">Faça login</a>
        </div>
    </div>
</div>
{% endblock %}
